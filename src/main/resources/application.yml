server:
  port: 8080
  servlet:
    context-path: /evaluation  # 注意：这决定了你的访问路径必须带 /evaluation
    session:
      timeout: 30m

spring:
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 确保此处的数据库名与你本地 MySQL 中创建的库名一致（当前是 evaluation_system）
    url: jdbc:mysql://localhost:3306/eval_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456  # 确保这是你本地数据库的真实密码
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # Thymeleaf 模板引擎配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML5
    encoding: UTF-8
    cache: false # 开发阶段关闭缓存，方便修改页面后立即生效
    servlet:
      content-type: text/html

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # 静态资源访问路径
  web:
    resources:
      static-locations: classpath:/static/

# MyBatis 框架配置
mybatis:
  mapper-locations: classpath:mapper/*.xml  # XML映射文件存放位置
  type-aliases-package: com.edu.evaluation.entity # 实体类所在的包名
  configuration:
    map-underscore-to-camel-case: true # 自动将数据库下划线字段转为Java驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 在控制台打印SQL日志，方便调试

# 日志级别配置
logging:
  level:
    com.edu.evaluation: DEBUG # 设置你自己的代码包为DEBUG级别，方便看报错细节
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# 自定义业务配置
app:
  upload-path: /uploads/
  export-path: /exports/