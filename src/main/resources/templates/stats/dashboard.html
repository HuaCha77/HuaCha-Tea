<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="common/fragments :: header_common('教学质量大数据看板')"></head>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
    .stat-card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        padding: 20px;
        margin-bottom: 20px;
        height: 400px;
    }
    .summary-box {
        background: #1890ff;
        color: white;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        margin-bottom: 20px;
    }
</style>
<body>
<div th:replace="common/fragments :: top_navbar"></div>

<div class="layout-body">
    <div th:replace="common/fragments :: side_menu('stats')"></div>

    <main class="main-content">
        <div class="container-fluid">
            <h2 class="mb-4">全校教学质量评价大数据分析</h2>
            
            <div class="row">
                <div class="col-md-3">
                    <div class="summary-box">
                        <h4>全校平均分</h4>
                        <h2 id="totalAvgScore">--</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="summary-box" style="background: #52c41a;">
                        <h4>累计评价次数</h4>
                        <h2 id="totalEvalCount">--</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="summary-box" style="background: #faad14;">
                        <h4>参与教师人数</h4>
                        <h2 id="teacherCount">--</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="summary-box" style="background: #eb2f96;">
                        <h4>课程覆盖率</h4>
                        <h2 id="courseCoverage">--</h2>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="stat-card" id="scoreDistributionChart"></div>
                </div>
                <div class="col-md-6">
                    <div class="stat-card" id="trendChart"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="stat-card" id="topTeachersChart" style="height: 500px;"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:inline="javascript">
    const contextPath = [[@{/}]].slice(0, -1);

    document.addEventListener('DOMContentLoaded', function() {
        loadRealData();
    });

    async function loadRealData() {
        try {
            const response = await fetch(contextPath + '/api/stats/global');
            const result = await response.json();
            
            if (result.code === 200) {
                const data = result.data;
                renderCharts(data);
                updateSummary(data);
            }
        } catch (e) {
            console.error("加载大数据失败", e);
        }
    }

    function updateSummary(data) {
        document.getElementById('totalAvgScore').innerText = (data.totalAvgScore || 0).toFixed(1);
        document.getElementById('totalEvalCount').innerText = (data.totalEvalCount || 0).toLocaleString();
        document.getElementById('teacherCount').innerText = data.teacherCount || 0;
        // 模拟课程覆盖率
        document.getElementById('courseCoverage').innerText = '95.0%';
    }

    function renderCharts(data) {
        // 1. 分数分布图
        const distData = data.scoreDistribution || [];
        const distributionChart = echarts.init(document.getElementById('scoreDistributionChart'));
        distributionChart.setOption({
            title: { text: '评分区间分布' },
            tooltip: {},
            xAxis: { data: distData.map(i => i.range_name) },
            yAxis: {},
            series: [{
                name: '评价数',
                type: 'bar',
                data: distData.map(i => i.count),
                itemStyle: { color: '#1890ff' }
            }]
        });

        // 2. 趋势图
        const trendData = data.semesterTrend || [];
        const trendChart = echarts.init(document.getElementById('trendChart'));
        trendChart.setOption({
            title: { text: '学期满意度趋势' },
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: trendData.map(i => i.name) },
            yAxis: { type: 'value', min: 0, max: 100 },
            series: [{
                data: trendData.map(i => i.score),
                type: 'line',
                smooth: true,
                areaStyle: { opacity: 0.3 }
            }]
        });

        // 3. 教师排行榜
        const teacherData = data.topTeachers || [];
        const topTeachersChart = echarts.init(document.getElementById('topTeachersChart'));
        topTeachersChart.setOption({
            title: { text: '优秀教师 Top 10' },
            tooltip: { trigger: 'axis' },
            yAxis: { type: 'category', data: teacherData.map(i => i.name).reverse() },
            xAxis: { type: 'value', max: 100 },
            series: [{
                name: '综合评分',
                type: 'bar',
                data: teacherData.map(i => i.score).reverse(),
                label: { show: true, position: 'right' },
                itemStyle: { color: '#52c41a' }
            }]
        });
    }
</script>
</body>
</html>
