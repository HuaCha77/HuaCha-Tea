<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="common/fragments :: header_common('控制台 - 教学评价系统')"></head>
<body>
<div th:replace="common/fragments :: top_navbar"></div>

<div class="layout-body">
    <div th:replace="common/fragments :: side_menu('index')"></div>

    <main class="main-content">
        <div class="container-fluid">
            <!-- 欢迎卡片 -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card bg-primary text-white p-4 border-0 shadow-lg" style="background: linear-gradient(135deg, #4361ee 0%, #3f37c9 100%) !important;">
                        <div class="d-flex align-items-center">
                            <div class="me-4">
                                <i class="fas fa-hand-sparkles fa-3x"></i>
                            </div>
                            <div>
                                <h2 class="mb-1 fw-bold">
                                    欢迎回来，<span th:text="${session.User != null ? (session.User.name != null ? session.User.name : session.User.username) : '用户'}">用户</span>！
                                </h2>
                                <p class="mb-0 opacity-75" th:text="'当前角色：' + ${session.User != null ? session.User.role : '未知'}">角色信息</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 统计卡片 (根据角色展示不同内容) -->
            <div class="row">
                <!-- 学生视角 -->
                <th:block th:if="${session.User != null && session.User.role == 'STUDENT'}">
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body d-flex align-items-center">
                                <div class="icon-box bg-light-primary text-primary me-3 p-3 rounded-circle">
                                    <i class="fas fa-tasks fa-2x"></i>
                                </div>
                                <div>
                                    <h6 class="text-muted mb-1">待评教任务</h6>
                                    <h3 class="fw-bold mb-0" th:text="${pendingTasks + ' 门'}">3 门</h3>
                                </div>
                            </div>
                            <div class="card-footer bg-transparent border-0 pt-0">
                                <a th:href="@{/student/my-tasks}" class="btn btn-link text-primary p-0">立即前往 <i class="fas fa-arrow-right ms-1"></i></a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body d-flex align-items-center">
                                <div class="icon-box bg-light-success text-success me-3 p-3 rounded-circle">
                                    <i class="fas fa-check-double fa-2x"></i>
                                </div>
                                <div>
                                    <h6 class="text-muted mb-1">已完成评价</h6>
                                    <h3 class="fw-bold mb-0" th:text="${completedTasks + ' 门'}">8 门</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body d-flex align-items-center">
                                <div class="icon-box bg-light-info text-info me-3 p-3 rounded-circle">
                                    <i class="fas fa-calendar-check fa-2x"></i>
                                </div>
                                <div>
                                    <h6 class="text-muted mb-1">本学期课程</h6>
                                    <h3 class="fw-bold mb-0" th:text="${totalTasks + ' 门'}">11 门</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </th:block>

                <!-- 教师/管理员视角 -->
                <th:block th:if="${session.User != null && (session.User.role == 'ADMIN' || session.User.role == 'TEACHER')}">
                    <div class="col-md-3 mb-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <div class="text-muted small fw-bold mb-2">全校平均分</div>
                                <div class="d-flex align-items-end">
                                    <h2 class="mb-0 fw-bold" th:text="${#numbers.formatDecimal(globalAvgScore, 1, 1)}">92.4</h2>
                                    <span class="text-success ms-2 small mb-1"><i class="fas fa-caret-up"></i> 1.2%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <div class="text-muted small fw-bold mb-2">参与评价次数</div>
                                <div class="d-flex align-items-end">
                                    <h2 class="mb-0 fw-bold" th:text="${#numbers.formatInteger(totalEvalCount, 1, 'COMMA')}">1,250</h2>
                                    <span class="text-muted ms-2 small mb-1">次</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <div class="text-muted small fw-bold mb-2">评价覆盖率</div>
                                <div class="d-flex align-items-end">
                                    <h2 class="mb-0 fw-bold">98.5%</h2>
                                    <span class="text-primary ms-2 small mb-1">高</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body text-center d-flex align-items-center justify-content-center">
                                <a th:href="@{/stats/dashboard}" class="btn btn-outline-primary rounded-pill px-4">
                                    查看大数据看板 <i class="fas fa-chart-pie ms-1"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </th:block>
            </div>

            <!-- 最近通知/动态 -->
            <div class="row mt-2">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header border-0 bg-transparent py-3">
                            <h5 class="mb-0 fw-bold"><i class="fas fa-bullhorn text-warning me-2"></i>系统公告</h5>
                        </div>
                        <div class="card-body pt-0">
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item px-0 py-3 d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="badge bg-danger me-2">重要</span>
                                        2026年春季学期教学质量评价任务现已开启
                                    </div>
                                    <small class="text-muted">2026-03-15</small>
                                </li>
                                <li class="list-group-item px-0 py-3 d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="badge bg-primary me-2">功能</span>
                                        系统已升级至 V3.2，新增大数据可视化统计模块
                                    </div>
                                    <small class="text-muted">2026-03-10</small>
                                </li>
                                <li class="list-group-item px-0 py-3 d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="badge bg-secondary me-2">常规</span>
                                        关于加强评教匿名性保护的技术说明
                                    </div>
                                    <small class="text-muted">2026-03-01</small>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header border-0 bg-transparent py-3">
                            <h5 class="mb-0 fw-bold"><i class="fas fa-clock text-info me-2"></i>常用功能</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-2">
                                <div class="col-6">
                                    <a th:href="@{/user/profile}" class="btn btn-light w-100 py-3 border shadow-sm hover-lift">
                                        <i class="fas fa-user-edit d-block mb-2 text-primary fa-lg"></i>
                                        <small class="fw-bold">个人资料</small>
                                    </a>
                                </div>
                                <div class="col-6">
                                    <a th:href="@{/user/password}" class="btn btn-light w-100 py-3 border shadow-sm hover-lift">
                                        <i class="fas fa-shield-alt d-block mb-2 text-success fa-lg"></i>
                                        <small class="fw-bold">修改密码</small>
                                    </a>
                                </div>
                                <!-- 根据角色显示特定常用功能 -->
                                <th:block th:if="${session.User != null}">
                                    <div class="col-6" th:if="${session.User.role == 'STUDENT'}">
                                        <a th:href="@{/student/my-tasks}" class="btn btn-light w-100 py-3 border shadow-sm hover-lift">
                                            <i class="fas fa-pen-nib d-block mb-2 text-warning fa-lg"></i>
                                            <small class="fw-bold">开始评教</small>
                                        </a>
                                    </div>
                                    <div class="col-6" th:if="${session.User.role == 'ADMIN'}">
                                        <a th:href="@{/user/list}" class="btn btn-light w-100 py-3 border shadow-sm hover-lift">
                                            <i class="fas fa-users-cog d-block mb-2 text-danger fa-lg"></i>
                                            <small class="fw-bold">用户管理</small>
                                        </a>
                                    </div>
                                    <div class="col-6" th:if="${session.User.role == 'TEACHER' || session.User.role == 'ADMIN'}">
                                        <a th:href="@{/stats/dashboard}" class="btn btn-light w-100 py-3 border shadow-sm hover-lift">
                                            <i class="fas fa-chart-pie d-block mb-2 text-info fa-lg"></i>
                                            <small class="fw-bold">统计分析</small>
                                        </a>
                                    </div>
                                </th:block>
                                <!-- 仅管理员和教师可见上传功能 -->
                                <th:block th:if="${session.User != null && (session.User.role == 'ADMIN' || session.User.role == 'TEACHER')}">
                                    <div class="col-6">
                                        <a href="javascript:void(0)" onclick="document.getElementById('globalUpload').click()" class="btn btn-light w-100 py-3 border shadow-sm hover-lift">
                                            <i class="fas fa-cloud-upload-alt d-block mb-2 text-success fa-lg"></i>
                                            <small class="fw-bold">文件上传</small>
                                        </a>
                                        <input type="file" id="globalUpload" style="display:none" onchange="handleGlobalUpload(this)">
                                    </div>
                                </th:block>

                                <div class="col-6">
                                    <a th:href="@{/api/common/download/manual}" class="btn btn-light w-100 py-3 border shadow-sm hover-lift">
                                        <i class="fas fa-file-download d-block mb-2 text-primary fa-lg"></i>
                                        <small class="fw-bold">资料下载</small>
                                    </a>
                                </div>
                                <div class="col-6">
                                    <a href="javascript:alert('功能建设中...')" class="btn btn-light w-100 py-3 border shadow-sm hover-lift">
                                        <i class="fas fa-question-circle d-block mb-2 text-secondary fa-lg"></i>
                                        <small class="fw-bold">使用帮助</small>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<style>
    .bg-light-primary { background-color: #e0e7ff; }
    .bg-light-success { background-color: #dcfce7; }
    .bg-light-info { background-color: #e0f2fe; }
    .icon-box { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
</style>
<script th:inline="javascript">
    const contextPath = [[@{/}]].slice(0, -1);

    async function handleGlobalUpload(input) {
        const file = input.files[0];
        if (!file) return;
        
        const formData = new FormData();
        formData.append('file', file);
        
        try {
            const response = await fetch(contextPath + '/api/common/upload', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.code === 200) {
                alert(result.message);
            } else {
                alert("上传失败: " + result.message);
            }
        } catch (e) {
            alert("网络连接异常，上传失败");
        }
    }
</script>
</body>
</html>
