<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="common/fragments :: header_common('控制台 - 首页')"></head>

<body>
<div th:replace="common/fragments :: top_navbar"></div>

<div class="layout-body">
    <div th:replace="common/fragments :: side_menu('index')"></div>

    <main class="main-content">
        <div class="card">
            <h2>欢迎来到教学评价管理系统</h2>
            <hr>
            <div class="alert alert-success">
                <p>当前角色：<strong th:text="${session.currentUser.role}"></strong></p>
                <p>您可以在左侧菜单选择相应的功能模块进行操作。</p>
            </div>

            <div class="dashboard-stats" style="display: flex; gap: 20px; margin-top: 20px;">
                <div style="background: white; padding: 20px; border-radius: 8px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                    <h4>待评价课程</h4>
                    <p style="font-size: 24px; color: #1abc9c;">3</p>
                </div>
                <div style="background: white; padding: 20px; border-radius: 8px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                    <h4>已提交评价</h4>
                    <p style="font-size: 24px; color: #3498db;">12</p>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
