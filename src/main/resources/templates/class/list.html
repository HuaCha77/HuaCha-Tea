<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="common/fragments :: header_common('班级管理')"></head>
<body>
<div th:replace="common/fragments :: top_navbar"></div>

<div class="layout-body">
    <div th:replace="common/fragments :: side_menu('class')"></div>

    <main class="main-content">
        <div class="card" style="background: white; padding: 20px; border-radius: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>班级信息清单</h3>
                <button class="btn btn-success" onclick="showAddModal()">+ 新增班级</button>
            </div>
            <hr>
            <table class="table" style="width: 100%; margin-top: 15px; border-collapse: collapse;">
                <thead>
                <tr style="background: #f8f9fa;">
                    <th>ID</th>
                    <th>班级名称</th>
                    <th>所属专业</th>
                    <th>年级</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${classList}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.className}"></td>
                    <td th:text="${c.major}"></td>
                    <td th:text="${c.grade}"></td>
                    <td th:text="${#dates.format(c.createTime, 'yyyy-MM-dd')}"></td>
                    <td>
                        <button class="btn btn-danger" th:onclick="'deleteClass(' + ${c.id} + ')'">删除</button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="addModal" class="modal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
            <div style="background:white; width:400px; margin:100px auto; padding:20px; border-radius:8px;">
                <h4>新增班级</h4>
                <hr>
                <form id="addForm">
                    <div class="form-group" style="margin-bottom:15px;">
                        <label>班级名称</label>
                        <input type="text" name="className" class="form-control" style="width:100%;" required>
                    </div>
                    <div class="form-group" style="margin-bottom:15px;">
                        <label>所属专业</label>
                        <input type="text" name="major" class="form-control" style="width:100%;" required>
                    </div>
                    <div class="form-group" style="margin-bottom:15px;">
                        <label>年级</label>
                        <input type="text" name="grade" class="form-control" style="width:100%;" placeholder="如：2022级" required>
                    </div>
                    <div style="text-align:right;">
                        <button type="button" class="btn" onclick="hideAddModal()">取消</button>
                        <button type="button" class="btn btn-primary" onclick="submitAdd()">提交</button>
                    </div>
                </form>
            </div>
        </div>

        <script th:inline="javascript">
            const contextPath = [[@{/}]].slice(0, -1);

                function showAddModal() {
                    document.getElementById('addModal').style.display = 'block';
                }

                function hideAddModal() {
                    document.getElementById('addModal').style.display = 'none';
                    document.getElementById('addForm').reset();
                }

                async function submitAdd() {
                    const form = document.getElementById('addForm');
                    const formData = new FormData(form);
                    const data = Object.fromEntries(formData.entries());

                    try {
                        const response = await fetch(contextPath + '/class/add', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                        const result = await response.json();
                        if (result.code === 200) {
                            alert("添加成功！");
                            location.reload();
                        } else {
                            alert(result.message);
                        }
                    } catch (error) {
                        alert("提交失败，请检查网络");
                    }
                }

            // 之前的 deleteClass 函数保持不变...
        </script>
    </main>
</div>

<script th:inline="javascript">
    const contextPath = [[@{/}]].slice(0, -1);

    function deleteClass(id) {
        if(confirm('确定要删除该班级吗？')) {
            fetch(contextPath + '/class/delete/' + id, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if(data.code === 200) {
                        location.reload();
                    } else {
                        alert(data.message);
                    }
                });
        }
    }
</script>
</body>
</html>
