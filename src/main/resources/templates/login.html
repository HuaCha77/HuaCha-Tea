<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学评价系统 - 登录</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="login-card shadow-lg">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="fas fa-graduation-cap fa-4x text-primary"></i>
            </div>
            <h1 class="login-title">教学评价系统</h1>
            <p class="login-subtitle">请登录您的账户以继续</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold">用户名 / 工号</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" name="username" class="form-control bg-light border-start-0" placeholder="请输入学号或工号" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">密码</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="请输入密码" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">登录身份</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user-tag text-muted"></i></span>
                    <select name="role" class="form-select bg-light border-start-0" required>
                        <option value="STUDENT">我是学生</option>
                        <option value="TEACHER">我是教师</option>
                        <option value="ADMIN">我是管理员</option>
                    </select>
                </div>
            </div>

            <button type="button" class="btn btn-primary w-100 py-3 fs-5 shadow-sm" onclick="doLogin()">
                <i class="fas fa-sign-in-alt me-2"></i>立即登录
            </button>
        </form>

        <div id="errorMsg" class="mt-3 text-center text-danger small fw-bold" style="min-height: 20px;"></div>
        
        <div class="mt-5 text-center text-muted small">
            &copy; 2026 高校教学质量评价系统 版权所有
        </div>
    </div>

    <script th:inline="javascript">
        const contextPath = [[@{/}]].slice(0, -1);

        async function doLogin() {
            const form = document.getElementById('loginForm');
            const formData = new FormData(form);
            const errorDiv = document.getElementById('errorMsg');

            errorDiv.innerText = "正在验证身份...";

            try {
                const response = await fetch(contextPath + '/login', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });

                const result = await response.json();

                if (result.code === 200) {
                    errorDiv.className = "mt-3 text-center text-success small fw-bold";
                    errorDiv.innerText = "登录成功，正在跳转...";
                    window.location.href = contextPath + '/index';
                } else {
                    errorDiv.className = "mt-3 text-center text-danger small fw-bold";
                    errorDiv.innerText = result.message || "登录失败，请检查用户名或密码";
                }
            } catch (error) {
                console.error(error);
                errorDiv.innerText = "网络异常，请稍后再试";
            }
        }

        // 回车键登录
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
    </script>
</body>
</html>
