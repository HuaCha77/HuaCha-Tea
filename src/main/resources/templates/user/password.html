<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="common/fragments :: header_common('修改密码 - 教学评价系统')"></head>
<body>
<div th:replace="common/fragments :: top_navbar"></div>

<div class="layout-body">
    <div th:replace="common/fragments :: side_menu('password')"></div>

    <main class="main-content">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white py-3 border-0">
                            <h4 class="fw-bold mb-0 text-primary"><i class="fas fa-key me-2"></i>修改密码</h4>
                        </div>
                        <div class="card-body p-4">
                            <div class="alert alert-info border-0 shadow-sm mb-4">
                                <i class="fas fa-info-circle me-2"></i>为了账户安全，建议定期修改登录密码。
                            </div>

                            <form id="passwordForm">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">原密码</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                        <input type="password" id="oldPassword" class="form-control bg-light border-start-0" placeholder="请输入当前使用的密码" required>
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold">新密码</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-shield-alt text-muted"></i></span>
                                        <input type="password" id="newPassword" class="form-control bg-light border-start-0" placeholder="请输入新密码（建议包含字母和数字）" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">确认新密码</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-double text-muted"></i></span>
                                        <input type="password" id="confirmPassword" class="form-control bg-light border-start-0" placeholder="请再次输入新密码" required>
                                    </div>
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="button" class="btn btn-primary py-2 fw-bold shadow-sm" onclick="savePassword()">
                                        <i class="fas fa-save me-2"></i>确认修改
                                    </button>
                                    <button type="button" class="btn btn-light py-2 fw-bold" onclick="location.href='/evaluation/index'">
                                        取消并返回
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:inline="javascript">
    const contextPath = [[@{/}]].slice(0, -1);

    async function savePassword() {
        const oldPassword = document.getElementById('oldPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!oldPassword || !newPassword || !confirmPassword) {
            alert("请完整填写所有密码项");
            return;
        }

        if (newPassword !== confirmPassword) {
            alert("两次输入的新密码不一致，请检查");
            return;
        }

        if (newPassword.length < 6) {
            alert("新密码长度不能少于6位");
            return;
        }

        const formData = new URLSearchParams();
        formData.append('oldPassword', oldPassword);
        formData.append('newPassword', newPassword);

        try {
            const response = await fetch(contextPath + '/user/password', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.code === 200) {
                alert("密码修改成功，请重新登录！");
                location.href = contextPath + '/logout';
            } else {
                alert(result.message);
            }
        } catch (error) {
            alert("提交失败，请重试");
        }
    }
</script>
</body>
</html>
